<!DOCTYPE html>
<html lang='en'>
  <head>
    <meta charset='UTF-8'>
    <title>Sign-up form</title>
    <link href='style.css' rel='stylesheet'>
  </head>
  <body>
    <div class='left-side'>
      <h1>ODIN</h1>
      <p>Photo by <a href="https://unsplash.com/@haliewestphoto">Halie West</a> on <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA">Unsplash</a></p>
    </div>
    <div class='right-side'>
      <div class='right-side-section top'>
        <div class="container">
          <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <i>now</i> to get started.</p>
          <p>You <i>know</i> you want to.</p>
        </div>
      </div>
      <div class='right-side-section middle'>
        <p>Let's do this!</p>
        <form id='sign-up-form' action='' method='post'>
          <div class='form-control'>
            <label for='first-name'>FIRST NAME</label>
            <input id='first-name' name='first-name' type='text' required>
          </div>
          <div class='form-control'>
            <label for='last-name'>LAST NAME</label>
            <input id='last-name' name='last-name' type='text' required>
          </div>
          <div class='form-control'>
            <label for='email'>EMAIL</label>
            <input id='email' name='email' type='email' required>
          </div>
          <div class='form-control'>
            <label for='phone-number'>PHONE NUMBER</label>
            <input id='phone-number' name='phone-number' type='tel'>
          </div>
          <div class='form-control'>
            <label for='password'>PASSWORD</label>
            <input id='password' name='password' type='password' required>
          </div>
          <div class='form-control'>
            <label for='confirm-password'>CONFIRM PASSWORD</label>
            <input id='confirm-password' name='confirm-password' type='password' required>
          </div>
        </form>
      </div>
      <div class='right-side-section bottom'>
        <div class="container">
          <button id='create-account' type='submit' form='sign-up-form'>Create Account</button>
          <p>Already have an account? <a id='log-in-link'>Log in</a></p>
        </div>
      </div>
    </div>
  </body>
</html>
